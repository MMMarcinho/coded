name: spec-change
description: Workflow for product spec and documentation changes.
stages:
  - kind: implement
    agent: claude-code
    prompt: .coded/prompts/implement.md
    required: true
  - kind: verify
    agent: codex
    prompt: .coded/prompts/verify.md
    required: true
    checks:
      - git diff --check
  - kind: checkpoint
    agent: claude-code
    prompt: .coded/prompts/checkpoint.md
    required: true
