# Loop Contract — 一次完整需求研发循环的契约文件。
# coded copies this into .coded/runs/<loop-id>/contract.yaml.
# In V1 the user fills it in by hand.

requirement:
  summary: ""              # 需求一句话描述
  source: ""               # product | tech_debt | bug | optimization | other
  priority: ""             # p0 | p1 | p2 | p3
  detail: ""               # 需求详细描述
  stakeholders: []          # 相关干系人
  userVisibleResults: []   # 用户可感知的变化
  deliverables: []          # 具体产出物
  successSignals: []       # 成功时的外部表现

context:
  reason: ""               # bug / feature / UX issue / tech debt
  currentBehavior: null
  relatedFiles: []
  relatedModules: []
  knownConstraints: []     # 已知约束和限制
  historicalNotes: []

scope:
  in: []                   # 本次要做
  out: []                  # 本次明确不做 — 防止范围蔓延

# Checkpoints are key-uncertainty stops, not progress logs.
checkpoints:
  - id: cp-1
    type: direction        # direction | scope | risk | integration | pre_submit | custom
    name: ""
    when: ""               # when to stop and confirm
    questions: []
    expectedEvidence: []
    status: pending        # pending | passed | failed | skipped
    notes: ""

# Self-tests are the acceptance cases. These are how we know the change is right.
selfTests:
  - id: st-1
    name: ""
    type: manual           # manual | unit | integration | e2e | command | screenshot
    required: true
    preconditions: []
    steps: []
    expectedResults: []
    latestEvidence: null
    status: unknown        # unknown | passed | failed | skipped

# Done criteria sit one level above self-tests: when can the loop end?
doneCriteria:
  required: []
  optional: []
  requiresUserConfirmation: []
