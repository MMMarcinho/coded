# Completion Analysis — coded's judgement when the task ends. Not just
# "done", but what was achieved, what is missing, the evidence, the risks, and
# a recommendation. Stored as .coded/runs/<task-id>/completion.yaml.
#
# Shape matches SPEC §3.5 / the CompletionAnalysis data model.

status: not_done           # done | partially_done | not_done | blocked
completed: []              # goals / self-tests that are satisfied, with refs
failedOrMissing: []        # what is unmet or absent
evidence: []               # command results, manual checks, screenshots, review notes
risks: []                  # remaining risks even if status is done
recommendation: continue_fixing   # finish | continue_fixing | needs_user_confirmation | split_follow_up
summary: ""
